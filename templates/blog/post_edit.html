{% extends 'base.html' %}

{% block title %} Редактировать пост {% endblock title %}

{% block content %}
<div class="create-post-container">
    <h1>Редактировать статью</h1>
    <form method="post" action="{% url 'blog:post-edit' post.pk %}" enctype="multipart/form-data">
        <input type="date" name="due_date" id="due_date" value="{{ form.due_date.value|default_if_none:'' }}">
        <label for="due_date">Срок выполнения:</label>
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit" class="submit-btn">Сохранить</button>
    </form>
</div>
{% endblock content %}
